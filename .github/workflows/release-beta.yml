name: Beta Release Channel

on:
  push:
    branches:
      - beta
    paths:
      - "module.json"
      - "scripts/**"
      - "styles/**"
      - "templates/**"
      - "languages/**"
      - ".github/workflows/release-beta.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Version Prefix (14.x.x)
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.version' module.json)"
          if [[ ! "$version" =~ ^14\. ]]; then
            echo "module.json version must start with 14.x.x, got: $version"
            exit 1
          fi

      - name: Validate Manifest Structure
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            (.id | type=="string" and length>0) and
            (.title | type=="string" and length>0) and
            (.version | type=="string" and length>0) and
            (.compatibility.minimum | type=="string") and
            (.compatibility.verified | type=="string") and
            (.compatibility.maximum | type=="string") and
            (.manifest | type=="string" and startswith("https://")) and
            (.download | type=="string" and startswith("https://"))
          ' module.json >/dev/null

          min="$(jq -r '.compatibility.minimum' module.json)"
          verified="$(jq -r '.compatibility.verified' module.json)"
          max="$(jq -r '.compatibility.maximum' module.json)"
          if [[ "$verified" != "14" || "$max" != "14" ]]; then
            echo "Expected compatibility.verified and compatibility.maximum to be 14"
            exit 1
          fi
          if (( min > verified )); then
            echo "compatibility.minimum must be <= compatibility.verified"
            exit 1
          fi

      - name: Validate JSON Files
        shell: bash
        run: |
          set -euo pipefail
          jq -e . module.json >/dev/null
          find languages -name '*.json' -print0 | xargs -0 -n1 jq -e . >/dev/null

      - name: Validate JavaScript Syntax
        shell: bash
        run: |
          set -euo pipefail
          find scripts -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Prepare Beta Manifest
        shell: bash
        run: |
          set -euo pipefail

          fvtt_min="13"
          fvtt_verified="14"
          fvtt_max="14"

          base_version="$(jq -r '.version' module.json)"
          base_version="${base_version%%-beta.*}"
          beta_version="${base_version}-beta.${GITHUB_RUN_NUMBER}"

          jq \
            --arg betaVersion "$beta_version" \
            --arg fvttMin "$fvtt_min" \
            --arg fvttVerified "$fvtt_verified" \
            --arg fvttMax "$fvtt_max" \
            --arg manifestUrl "https://github.com/Niclasp1501/Ninjos-Player-Wheel/releases/download/beta-latest/module-beta.json" \
            --arg downloadUrl "https://github.com/Niclasp1501/Ninjos-Player-Wheel/releases/download/beta-latest/module-beta.zip" \
            '.version = $betaVersion
             | .compatibility.minimum = $fvttMin
             | .compatibility.verified = $fvttVerified
             | .compatibility.maximum = $fvttMax
             | .manifest = $manifestUrl
             | .download = $downloadUrl' \
            module.json > module-beta.json

      - name: Prepare Beta Release Notes
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.version' module-beta.json)"
          {
            echo "# Ninjo's Player Wheel Beta"
            echo
            echo "- Channel: \`beta-latest\`"
            echo "- Version: \`$version\`"
            echo "- Foundry Compatibility: \`13 - 14\`"
            echo
            echo "## Latest Changes"
            awk '
              BEGIN{found=0}
              /^## \[/{
                if(found==1){exit}
                if(found==0){found=1; print; next}
              }
              found==1{print}
            ' CHANGELOG.md
          } > beta-release-notes.md

      - name: Build Beta Archive
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .beta-dist module-beta.zip
          mkdir -p .beta-dist

          rsync -a ./ ./.beta-dist/ \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".beta-dist" \
            --exclude "module-beta.json" \
            --exclude "module-beta.zip" \
            --exclude "README.md" \
            --exclude "CHANGELOG.md"

          cp module-beta.json .beta-dist/module.json

          (
            cd .beta-dist
            zip -r ../module-beta.zip .
          )

      - name: Update beta-latest tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f beta-latest
          git push origin refs/tags/beta-latest --force

      - name: Create/Update Beta GitHub Prerelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: beta-latest
          name: Beta latest (FVTT 13-14)
          draft: false
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            module-beta.json
            module-beta.zip
          body_path: beta-release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
